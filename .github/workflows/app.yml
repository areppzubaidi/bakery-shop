name: App Pipeline - Build, Test, Push

on:
  push:
    branches: [ main ]
    paths:
      - 'index.html'
      - 'css/**'
      - 'Dockerfile'
      - 'nginx.conf'

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/bakery-shop

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Test build locally
        run: |
          docker build -t bakery-test .
          docker run -d -p 8080:80 --name test bakery-test
          curl --retry 3 --fail http://localhost:8080 | grep "Sweet Bakery"
          docker stop test && docker rm test
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.DOCKER_IMAGE }}:latest,${{ env.DOCKER_IMAGE }}:${{ github.sha }}
