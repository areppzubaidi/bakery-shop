name: Terraform Pipeline - Infrastructure

on:
  workflow_dispatch:
  push:
    paths:
      - 'terraform/**'
    branches: [ main ]

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0
      - name: Terraform Init
        run: terraform init
      - name: Terraform Plan
        run: terraform plan -var="docker_image=${{ secrets.DOCKERHUB_USERNAME }}/bakery-shop:latest" -var="my_ip=${{ secrets.MY_IP }}"
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve -var="docker_image=${{ secrets.DOCKERHUB_USERNAME }}/bakery-shop:latest" -var="my_ip=${{ secrets.MY_IP }}"
