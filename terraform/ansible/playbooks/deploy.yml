---
- name: Deploy bakery app to ASG instances
  hosts: app_instances
  become: yes
  vars:
    docker_image: "{{ docker_image }}"
    s3_bucket: "{{ s3_bucket }}"

  tasks:
    - name: Install pip (if missing)
      apt:
        name: python3-pip
        state: present

    - name: Install Docker SDK for Python
      pip:
        name: docker
        state: present

    - name: Pull latest image
      docker_image:
        name: "{{ docker_image }}"
        source: pull

    - name: Remove existing container if any (force)
      docker_container:
        name: bakery
        state: absent
        force_kill: yes

    - name: Run new container
      docker_container:
        name: bakery
        image: "{{ docker_image }}"
        ports:
          - "80:80"
        restart_policy: always
        state: started
        pull: yes

    - name: Ensure Node Exporter is running
      systemd:
        name: node_exporter
        state: started
        enabled: yes

    - name: Create backup script
      copy:
        dest: /usr/local/bin/backup_logs.sh
        mode: '0755'
        content: |
          #!/bin/bash
          S3_BUCKET={{ s3_bucket }}
          HOSTNAME=$(hostname)
          DATE=$(date +%Y%m%d-%H%M)
          aws s3 cp /var/log/nginx/access.log s3://$S3_BUCKET/nginx-logs/$HOSTNAME/access-$DATE.log 2>/dev/null || true
          aws s3 cp /var/log/nginx/error.log s3://$S3_BUCKET/nginx-logs/$HOSTNAME/error-$DATE.log 2>/dev/null || true

    - name: Schedule backup cron job
      cron:
        name: "backup nginx logs"
        minute: "0"
        hour: "*/6"
        job: "/usr/local/bin/backup_logs.sh"
